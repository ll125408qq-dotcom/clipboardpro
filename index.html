<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>win新剪贴板 - 增强型剪贴板管理器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 整个应用容器 -->
  <div id="app">

    <!-- ====== 左侧边栏 ====== -->
    <aside class="timeline-sidebar">
      <!-- 收藏夹面板（在上） -->
      <div class="favorites-section">
        <div class="panel-header">
          <span class="panel-title">⭐ 收藏夹</span>
          <button id="newFolderBtn" class="btn-new-folder" title="新建文件夹">＋ 新建文件夹</button>
        </div>
        <div class="favorites-body">
          <ul id="folderList" class="folder-list">
            <!-- 由 renderer.js 动态生成 -->
          </ul>
        </div>
      </div>

      <!-- 分割线 -->
      <div class="sidebar-divider"></div>

      <!-- 时间线面板（在下） -->
      <div class="timeline-section">
        <div class="panel-header">
          <span class="panel-title">📅 时间线</span>
          <button id="timelineAllBtn" class="timeline-all-btn active" title="显示全部">全部</button>
        </div>
        <div class="timeline-body">
          <div id="timelineNodes" class="timeline-nodes">
            <!-- 时间线节点由 renderer.js 动态生成 -->
          </div>
          <div id="timelineEmpty" class="timeline-empty" style="display:none">
            <span>暂无记录</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ====== 右侧主内容区 ====== -->
    <div class="main-panel">
      <!-- 顶部标题栏 + 搜索框 -->
      <header class="app-header">
        <div class="title-bar">
          <span class="app-title">📋 win新剪贴板</span>
          <div class="window-controls">
            <button id="minimizeBtn" class="win-btn" title="最小化">−</button>
            <button id="closeBtn" class="win-btn close" title="关闭">×</button>
          </div>
        </div>

        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="searchInput"
            placeholder="搜索复制内容..."
            autocomplete="off"
          />
          <button id="clearSearchBtn" class="clear-search" title="清空搜索">×</button>
        </div>
      </header>

      <!-- 剪贴板历史列表 -->
      <main class="history-container">
        <ul id="historyList" class="history-list">
          <!-- 列表项由 renderer.js 动态生成 -->
        </ul>

        <!-- 空状态提示 -->
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">📋</div>
          <p>暂无剪贴板记录</p>
          <span>复制任意文本后，这里会自动显示历史记录</span>
        </div>
      </main>
    </div>

  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast">已复制</div>

  <!-- 弹窗：新建/重命名文件夹 -->
  <div id="folderModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle">新建文件夹</div>
      <input type="text" id="modalInput" class="modal-input" placeholder="输入文件夹名称" />
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn btn-secondary">取消</button>
        <button id="modalConfirmBtn" class="btn btn-primary">确认</button>
      </div>
    </div>
  </div>

  <!-- 收藏时选择文件夹弹窗 -->
  <div id="favPickerModal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="width:300px">
      <div class="modal-title">收藏到文件夹</div>
      <ul id="favPickerList" class="fav-picker-list"></ul>
      <button id="favPickerNewBtn" class="btn btn-secondary" style="width:100%;margin-top:6px">＋ 新建文件夹</button>
      <div class="modal-actions" style="margin-top:8px">
        <button id="favPickerCancelBtn" class="btn btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <!-- 文件夹右键菜单 -->
  <div id="ctxMenu" class="ctx-menu" style="display:none">
    <div class="ctx-item" data-action="rename">✏️ 重命名</div>
    <div class="ctx-item" data-action="delete">🗑️ 删除</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
